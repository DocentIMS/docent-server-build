# ============================================================================
# products.cfg - Docent products overlay buildout
# ============================================================================
# Purpose: ADD Docent add-on products to an EXISTING Plone instance that was
#          already built by phase 7b. This file does NOT install Plone itself.
#
# It extends the phase-7b buildout (buildout.cfg in the same instance dir),
# inheriting that file's Plone version pins, port, admin user, blob path, etc.
# It only ADDS:
#   - mr.developer git sources for the Docent products
#   - those products to the instance egg list
#
# Run from inside the instance directory (the one phase 7b created), as the
# 'plone' user:
#     bin/buildout -c products.cfg
#     bin/instance restart
#
# bin/instance is regenerated in place - same path - so the phase 7c systemd
# unit keeps working without changes.
# ============================================================================

[buildout]
# Inherit EVERYTHING from the phase-7b buildout: Plone 6.2.0 version pins,
# the [instance] recipe/user/port/blob-storage, etc. We do NOT re-extend
# dist.plone.org versions files here - phase 7b already pinned them, and
# re-extending risks a version-pin collision.
extends = buildout.cfg

# mr.developer is needed to pull the product source from git.
# (buildout.sanitycheck refuses to run buildout as root - keep it.)
extensions =
    mr.developer
    buildout.sanitycheck

# Products whose source we pull from git via mr.developer.
# onlyoffice.plone is intentionally OMITTED for now (see project TODO).
auto-checkout =
    medialog.notifications
    medialog.meadows
    medialog.docxtransform
    medialog.docenttheme
    DocentIMS.ActionItems
    collective.sidebar
    collective.collectionfilter

# Where mr.developer drops the checked-out source.
sources-dir = src

# ----------------------------------------------------------------------------
# Add the products to the instance egg list.
# The '+=' is critical: it APPENDS to the eggs list defined in buildout.cfg
# rather than replacing it. So Plone (from phase 7b) stays, and these are
# added on top.
# ----------------------------------------------------------------------------
[instance]
eggs +=
    medialog.notifications
    medialog.meadows
    medialog.docxtransform
    medialog.docenttheme
    DocentIMS.ActionItems
    collective.sidebar
    collective.collectionfilter
    collective.fullcalendar
    python-docx

# ----------------------------------------------------------------------------
# mr.developer source repositories for the Docent products.
# ----------------------------------------------------------------------------
[sources]
medialog.notifications     = git https://github.com/espenmn/medialog.notifications.git
medialog.meadows           = git https://github.com/espenmn/medialog.meadows.git
medialog.docxtransform     = git https://github.com/espenmn/medialog.docxtransform.git
medialog.docenttheme       = git https://github.com/espenmn/medialog.docenttheme.git
DocentIMS.ActionItems      = git https://github.com/DocentIMS/DocentIMS.ActionItems.git
collective.sidebar         = git https://github.com/collective/collective.sidebar.git
collective.collectionfilter = git https://github.com/collective/collective.collectionfilter.git

# Version pindowns: leave empty. Phase 7b's buildout.cfg already supplies the
# Plone 6.2.0 version set via its extends. Adding pins here could collide.
[versions]
