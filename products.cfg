[buildout]
extends = buildout.cfg

extensions =
    mr.developer

auto-checkout =
    collective.sidebar
    medialog.notifications
    onlyoffice.plone
    DocentIMS.ActionItems
    medialog.docenttheme
    plone.app.changeownership
    medialog.meadows
    medialog.docxtransform
    DocentIMS.TinyMCEModifications

[sources]
collective.sidebar     = git https://github.com/collective/collective.sidebar.git
medialog.notifications = git https://github.com/espenmn/medialog.notifications.git
onlyoffice.plone       = git https://github.com/DocentIMS/onlyoffice-plone.git
DocentIMS.ActionItems  = git git@github.com:DocentIMS/DocentIMS.ActionItems.git
medialog.docenttheme   = git git@github.com:DocentIMS/medialog.docenttheme.git
plone.app.changeownership = git https://github.com/DocentIMS/change_ownership.git rev=2.1
medialog.meadows       = git https://github.com/espenmn/medialog.meadows.git
medialog.docxtransform = git https://github.com/espenmn/medialog.docxtransform.git
DocentIMS.TinyMCEModifications = git git@github.com:DocentIMS/DocentIMS.TinyMCEModifications.git branch=main

[instance]
eggs +=
    collective.collectionfilter
    collective.sidebar
    medialog.notifications
    onlyoffice.plone
    DocentIMS.ActionItems
    medialog.docenttheme
    plone.app.changeownership
    medialog.meadows
    medialog.docxtransform
    DocentIMS.TinyMCEModifications
    python-docx
