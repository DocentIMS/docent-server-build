[buildout]
extends = buildout.cfg

extensions =
    mr.developer

auto-checkout =
    collective.sidebar
    medialog.notifications
    onlyoffice.plone
    DocentIMS.ActionItems
    medialog.docenttheme
    plone.app.changeownership
    medialog.docxtransform
    DocentIMS.TinyMCEModifications

[sources]
# Sources are PINNED to the exact commits that built the Chelsea site cleanly on
# 2026-06-22 (known-good). Builds are now reproducible: a branch push by anyone
# (incl. espenmn repos below) cannot change a build. To take a new version,
# bump the rev= here deliberately. See [[docent-server-build-phases]] memory.
collective.sidebar     = git https://github.com/collective/collective.sidebar.git rev=361073f5e7124639c911b21057ba69e0305c4bf8
medialog.notifications = git https://github.com/espenmn/medialog.notifications.git rev=1747c109233e5263b7560ca7cf80c80c50f4fbea
onlyoffice.plone       = git https://github.com/DocentIMS/onlyoffice-plone.git rev=a2489a587fb62f1dec924ffcbd1a5a14be54bdc2
DocentIMS.ActionItems  = git git@github.com:DocentIMS/DocentIMS.ActionItems.git rev=c4550301dbad802c7043a7dbd3eb0bbcf6681e97
medialog.docenttheme   = git git@github.com:DocentIMS/medialog.docenttheme.git rev=29827e1fe1ea4b9aadb3974fcd1ca12ae1d31061
plone.app.changeownership = git https://github.com/DocentIMS/change_ownership.git rev=2.1
# --- medialog.meadows REMOVED 2026-06-22 -------------------------------------
# Redundant empty bundle pulled from espenmn's personal GitHub: not a Diazo
# theme, ships no real code, empty post_install; nothing depends on it; and all
# four of its profile deps (medialog.docenttheme, collective.collectionfilter,
# medialog.notifications, collective.sidebar) are already activated directly.
# Its setuphandler's TinyMCE registry-repair also broke on plone.registry 3.x.
# TO RESTORE: re-add 'medialog.meadows' to auto-checkout (above) + [instance]
# eggs (below) + phase7e ACTIVATION_ORDER, then uncomment the next line:
#medialog.meadows       = git https://github.com/espenmn/medialog.meadows.git
medialog.docxtransform = git https://github.com/espenmn/medialog.docxtransform.git rev=6961a58025671bcfe3d465caffb8233d4dd9fe19
DocentIMS.TinyMCEModifications = git git@github.com:DocentIMS/DocentIMS.TinyMCEModifications.git rev=39ccffe2b46e8c9a551a1320b15643f062cbfc15

[instance]
eggs +=
    collective.collectionfilter
    collective.sidebar
    medialog.notifications
    onlyoffice.plone
    DocentIMS.ActionItems
    medialog.docenttheme
    plone.app.changeownership
    medialog.docxtransform
    DocentIMS.TinyMCEModifications
    python-docx


[versions]
# Security pins from the Plone security team (2026-06). These override the older
# versions in dist.plone.org release/6.2.0/versions.cfg (which buildout.cfg
# extends). RestrictedPython 8.3 closes a sandbox escape (positional-only
# parameter shadowing protected names like _getattr_); the rest are security
# point-releases. All verified on PyPI and compatible with Python 3.14.
icalendar = 7.1.3
plone.app.contenttypes = 5.0.1
plone.app.dexterity = 5.0.1
plone.app.event = 6.0.1
plone.app.portlets = 7.0.2
RestrictedPython = 8.3
